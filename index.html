            { val:5, text:"坚守规则，法理大于人情" },
            { val:3, text:"看具体情境，尽量两全" },
            { val:1, text:"人情至上，规则可以变通" } ] },
        { text: "你对自己的能力评价是？", dim: "confidence", opts: [
            { val:5, text:"非常自信，相信能克服大多数困难" },
            { val:3, text:"一般，有时会怀疑" },
            { val:1, text:"常常觉得自己不够好" } ] },
        { text: "你更向往哪种生活？", dim: "belief", opts: [
            { val:5, text:"田园诗般的和平乡村，邻里互助" },
            { val:3, text:"繁华都市，机会与挑战并存" },
            { val:1, text:"强者为尊的荒野，凭实力说话" } ] },
        { text: "如果有一个冒险的机会，你会？", dim: "action", opts: [
            { val:5, text:"立刻收拾行李，说走就走" },
            { val:3, text:"考虑周全后再决定" },
            { val:1, text:"太危险了，还是算了" } ] },
        { text: "你更容易被哪种艺术作品打动？", dim: "empathy", opts: [
            { val:5, text:"描绘细腻情感与人间疾苦的作品" },
            { val:3, text:"展现智慧与谋略的故事" },
            { val:1, text:"宏大叙事与英雄史诗" } ] },
        { text: "对于‘忠诚’二字，你认为？", dim: "principle", opts: [
            { val:5, text:"人无信不立，忠诚是最宝贵的品质" },
            { val:3, text:"忠诚很重要，但也看对象" },
            { val:1, text:"忠诚有时是愚昧，利益更实在" } ] },
        { text: "当你失败时，你通常？", dim: "confidence", opts: [
            { val:1, text:"一蹶不振，需要很长时间恢复" },
            { val:3, text:"会难过，但很快调整" },
            { val:5, text:"迅速复盘，越挫越勇" } ] }
    ];

    // 维度映射
    const dimKeys = ["belief", "action", "empathy", "principle", "confidence"];
    
    // 当前状态
    let currentIndex = 0;
    let userAnswers = new Array(20).fill(null);
    let quizStarted = false;

    // DOM 元素
    const landing = document.getElementById('landingView');
    const quizView = document.getElementById('quizView');
    const loadingView = document.getElementById('loadingView');
    const resultView = document.getElementById('resultView');
    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const shareBtn = document.getElementById('shareBtn');
    const saveImgBtn = document.getElementById('saveImgBtn');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const qIndexDisplay = document.getElementById('qIndexDisplay');
    const qCountDisplay = document.getElementById('qCountDisplay');
    const progressFill = document.getElementById('progressFill');

    // 渲染当前题目
    function renderQuestion() {
        const q = questions[currentIndex];
        questionText.innerText = q.text;
        optionsContainer.innerHTML = '';
        const selectedVal = userAnswers[currentIndex];
        q.opts.forEach((opt, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'quiz-option';
            if (selectedVal !== null && selectedVal === opt.val) optDiv.classList.add('selected');
            const prefix = String.fromCharCode(65+idx);
            optDiv.innerHTML = `<span style="font-weight:500;">${prefix}.</span> ${opt.text}`;
            optDiv.addEventListener('click', () => {
                userAnswers[currentIndex] = opt.val;
                renderQuestion();
                nextBtn.disabled = false;
                if (currentIndex === questions.length-1) nextBtn.innerText = '完成 ✓';
                else nextBtn.innerText = '下一题 →';
            });
            optionsContainer.appendChild(optDiv);
        });
        nextBtn.disabled = (userAnswers[currentIndex] === null);
        qIndexDisplay.innerText = `第${currentIndex+1}题`;
        qCountDisplay.innerText = `${currentIndex+1} / ${questions.length}`;
        progressFill.style.width = `${((currentIndex+1)/questions.length)*100}%`;
        // 上一题按钮状态
        prevBtn.disabled = (currentIndex === 0);
    }

    // 计算各维度总分
    function computeScores() {
        let scores = { belief:0, action:0, empathy:0, principle:0, confidence:0 };
        for (let i=0; i<questions.length; i++) {
            const dim = questions[i].dim;
            const ans = userAnswers[i];
            if (ans !== null) scores[dim] += ans;
        }
        // 每个维度4题，满分20，最低4分，直接使用
        return scores;
    }

    // 匹配最相似角色（欧氏距离）
    function matchCharacter(scores) {
        let bestKey = null;
        let minDist = Infinity;
        for (let key of characterKeys) {
            const dimsTarget = CHARACTERS[key].dims;
            let dist = 0;
            dist += Math.pow(scores.belief - dimsTarget[0], 2);
            dist += Math.pow(scores.action - dimsTarget[1], 2);
            dist += Math.pow(scores.empathy - dimsTarget[2], 2);
            dist += Math.pow(scores.principle - dimsTarget[3], 2);
            dist += Math.pow(scores.confidence - dimsTarget[4], 2);
            dist = Math.sqrt(dist);
            if (dist < minDist) {
                minDist = dist;
                bestKey = key;
            }
        }
        return { key: bestKey, distance: minDist };
    }

    // 雷达图绘制
    function renderRadarChart(scores) {
        const canvas = document.getElementById('radarCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width = 400;
        const h = canvas.height = 400;
        const centerX = w/2, centerY = h/2;
        const radius = 140;
        const angles = [ -Math.PI/2, -Math.PI/2 + 2*Math.PI/5, -Math.PI/2 + 4*Math.PI/5, -Math.PI/2 + 6*Math.PI/5, -Math.PI/2 + 8*Math.PI/5 ];
        const labels = ["信念(理想)", "行动(主动)", "情感(热忱)", "原则(守序)", "自信(坚定)"];
        ctx.clearRect(0,0,w,h);
        ctx.strokeStyle = "#4b5563";
        ctx.fillStyle = "#e2e8f0";
        ctx.font = "12px 'Segoe UI'";
        // 网格
        for(let level=1; level<=4; level++) {
            ctx.beginPath();
            let r = radius * level / 4;
            for(let i=0;i<5;i++) {
                let x = centerX + r * Math.cos(angles[i]);
                let y = centerY + r * Math.sin(angles[i]);
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.strokeStyle = "#334155";
            ctx.stroke();
        }
        // 轴
        for(let i=0;i<5;i++) {
            let x = centerX + radius * Math.cos(angles[i]);
            let y = centerY + radius * Math.sin(angles[i]);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x,y);
            ctx.strokeStyle = "#475569";
            ctx.stroke();
            let labelX = centerX + (radius+15) * Math.cos(angles[i]);
            let labelY = centerY + (radius+15) * Math.sin(angles[i]);
            ctx.fillStyle = "#facc15";
            ctx.fillText(labels[i], labelX-15, labelY-5);
        }
        // 数据区域
        let points = [];
        for(let i=0;i<5;i++) {
            let value = Math.min(20, Math.max(0, scores[i])) / 20;
            let r = radius * value;
            let x = centerX + r * Math.cos(angles[i]);
            let y = centerY + r * Math.sin(angles[i]);
            points.push({x,y});
        }
        ctx.beginPath();
        for(let i=0;i<points.length;i++) {
            if(i===0) ctx.moveTo(points[i].x, points[i].y);
            else ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(245,158,11,0.3)";
        ctx.fill();
        ctx.strokeStyle = "#f59e0b";
        ctx.lineWidth = 2;
        ctx.stroke();
        for(let p of points) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = "#fbbf24";
            ctx.fill();
        }
    }

    // 显示结果页面
    function showResult() {
        const finalScores = computeScores();
        const match = matchCharacter(finalScores);
        const char = CHARACTERS[match.key];
        const radarData = [finalScores.belief, finalScores.action, finalScores.empathy, finalScores.principle, finalScores.confidence];
        
        const traitsHtml = char.traits.map(t => `<span class="trait-badge">${t}</span>`).join('');
        const resultHtml = `
            <div style="text-align:center;">
                <div style="font-size:3rem;">⚜️</div>
                <h2 class="serif-title gold-text" style="font-size:2rem;">${match.key}</h2>
                <p style="color:#fbbf24; letter-spacing:2px;">${char.title} · ${char.mbti}</p>
                <p style="background:rgba(0,0,0,0.4); border-radius:30px; padding:0.3rem 1rem; display:inline-block;">${char.faction}</p>
                <div style="margin:1rem 0;">${traitsHtml}</div>
                <div class="quote" style="padding:1rem;"><p>“${char.quote}”</p></div>
                <p style="text-align:left; line-height:1.5;">${char.desc}</p>
                <div class="radar-container" id="radarCanvasWrap">
                    <canvas id="radarCanvas" width="400" height="400" style="max-width:100%; height:auto; background:#0a0c15; border-radius:20px;"></canvas>
                </div>
                <p style="font-size:0.75rem; color:#aaa;">※ 维度分数: 信念/行动/情感/原则/自信 (0~20)</p>
            </div>
        `;
        document.getElementById('resultCardContainer').innerHTML = resultHtml;
        renderRadarChart(radarData);
    }

    // 重置测试
    function resetTest() {
        currentIndex = 0;
        userAnswers = new Array(20).fill(null);
        landing.classList.remove('hidden');
        quizView.classList.add('hidden');
        loadingView.classList.add('hidden');
        resultView.classList.add('hidden');
        nextBtn.disabled = true;
        nextBtn.innerText = '下一题 →';
    }

    // 开始答题
    function startQuizFlow() {
        landing.classList.add('hidden');
        quizView.classList.remove('hidden');
        currentIndex = 0;
        userAnswers = new Array(20).fill(null);
        renderQuestion();
    }

    // 下一题
    function nextQuestion() {
        if (userAnswers[currentIndex] === null) return;
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            renderQuestion();
        } else {
            // 完成测试，跳转加载
            quizView.classList.add('hidden');
            loadingView.classList.remove('hidden');
            setTimeout(() => {
                loadingView.classList.add('hidden');
                showResult();
                resultView.classList.remove('hidden');
            }, 1200);
        }
    }

    // 上一题
    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    // 分享文本
    function shareResult() {
        const finalScores = computeScores();
        const match = matchCharacter(finalScores);
        const char = CHARACTERS[match.key];
        const shareText = `【铃兰之剑·命运之轮】我的性格结果是：${match.key} · ${char.title} (${char.mbti})\n“${char.quote}”\n快来测测你是哪位英雄？`;
        if(navigator.clipboard) {
            navigator.clipboard.writeText(shareText).then(()=>alert("结果已复制，快去分享吧！"));
        } else alert(shareText);
    }

    // 保存图片
    async function saveAsImage() {
        const resultCard = document.getElementById('resultCardContainer');
        if(!resultCard) return;
        try {
            const canvasImg = await html2canvas(resultCard, { scale: 2, backgroundColor: '#0f121f' });
            const link = document.createElement('a');
            link.download = 'linglan_result.png';
            link.href = canvasImg.toDataURL();
            link.click();
        } catch(e) { alert("生成图片失败，可尝试截图"); }
    }

    // 事件绑定
    startBtn.addEventListener('click', startQuizFlow);
    retryBtn.addEventListener('click', resetTest);
    nextBtn.addEventListener('click', nextQuestion);
    prevBtn.addEventListener('click', prevQuestion);
    shareBtn.addEventListener('click', shareResult);
    saveImgBtn.addEventListener('click', saveAsImage);

    // 粒子背景
    function initParticles() {
        const container = document.getElementById('particlesContainer');
        for(let i=0;i<80;i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 4 + 1;
            p.style.width = size+'px';
            p.style.height = size+'px';
            p.style.left = Math.random()*100+'%';
            p.style.top = Math.random()*100+'%';
            p.style.animationDuration = Math.random()*8+4+'s';
            p.style.animationDelay = Math.random()*5+'s';
            container.appendChild(p);
        }
    }
    initParticles();
</script>
