        { text: "面对高难度新挑战，你第一反应？", dim: "confidence", opts: [{val:5,text:"充满信心，我能搞定"},{val:3,text:"有点紧张，但愿意尝试"},{val:1,text:"怀疑自己，需要鼓励"}] },
        { text: "你认为理想的社会应当？", dim: "belief", opts: [{val:5,text:"人人平等，温情互助"},{val:3,text:"有序但允许竞争"},{val:1,text:"强者生存，优胜劣汰"}] },
        { text: "在团队合作中，你常扮演？", dim: "action", opts: [{val:5,text:"领导者/先锋"},{val:3,text:"协调者/智囊"},{val:1,text:"执行者/后勤"}] },
        { text: "看到感人的电影片段，你会？", dim: "empathy", opts: [{val:5,text:"哭得稀里哗啦"},{val:3,text:"鼻子发酸，忍住"},{val:1,text:"内心毫无波澜"}] },
        { text: "对于约定好的事情，你通常？", dim: "principle", opts: [{val:5,text:"风雨无阻，必须做到"},{val:3,text:"尽量做到，意外会沟通"},{val:1,text:"看心情，临时改变"}] },
        { text: "当别人批评你时，你更容易？", dim: "confidence", opts: [{val:1,text:"非常沮丧，自我怀疑"},{val:3,text:"有点不开心，会反思"},{val:5,text:"冷静分析，合理就接受"}] },
        { text: "你更欣赏哪种英雄？", dim: "belief", opts: [{val:5,text:"牺牲自己拯救众人"},{val:3,text:"智勇双全，改变战局"},{val:1,text:"开创帝国，铁腕统治"}] },
        { text: "在派对上，你通常是？", dim: "action", opts: [{val:5,text:"气氛组，玩得最嗨"},{val:3,text:"和熟人聊天"},{val:1,text:"角落待着"}] },
        { text: "你觉得自己更偏向？", dim: "empathy", opts: [{val:5,text:"感性浪漫，容易共情"},{val:3,text:"平衡，看情况"},{val:1,text:"冷静理性，注重逻辑"}] },
        { text: "当规则与情义冲突时，你会？", dim: "principle", opts: [{val:5,text:"坚守规则，法理大于人情"},{val:3,text:"看情境，尽量两全"},{val:1,text:"人情至上，规则变通"}] },
        { text: "你对自己的能力评价？", dim: "confidence", opts: [{val:5,text:"非常自信"},{val:3,text:"一般，有时怀疑"},{val:1,text:"常常觉得自己不够好"}] },
        { text: "你更向往哪种生活？", dim: "belief", opts: [{val:5,text:"田园和平，邻里互助"},{val:3,text:"繁华都市，机会挑战"},{val:1,text:"强者为尊，凭实力"}] },
        { text: "如果有一个冒险的机会，你会？", dim: "action", opts: [{val:5,text:"立刻收拾行李，说走就走"},{val:3,text:"考虑周全再决定"},{val:1,text:"太危险了，算了"}] },
        { text: "你更容易被哪种艺术作品打动？", dim: "empathy", opts: [{val:5,text:"细腻情感与人间疾苦"},{val:3,text:"智慧与谋略的故事"},{val:1,text:"宏大叙事与英雄史诗"}] },
        { text: "对于‘忠诚’二字，你认为？", dim: "principle", opts: [{val:5,text:"人无信不立，最宝贵"},{val:3,text:"很重要，也看对象"},{val:1,text:"有时是愚昧，利益实在"}] },
        { text: "当你失败时，你通常？", dim: "confidence", opts: [{val:1,text:"一蹶不振，恢复很久"},{val:3,text:"会难过，但很快调整"},{val:5,text:"迅速复盘，越挫越勇"}] },
        // 新增权重题1：测量对“信念 vs 现实”和“情感 vs 理性”的重视程度
        { text: "当你评判一个人的行为时，你更看重他的动机还是结果？", dim: "weight_mix1", opts: [
            {val:5, text:"动机最重要，好心办坏事也可以理解", weightEffect: {belief:1.3, empathy:1.2} },
            {val:3, text:"两者平衡，看具体情况", weightEffect: {belief:1.0, empathy:1.0} },
            {val:1, text:"结果最重要，成王败寇", weightEffect: {belief:0.7, empathy:0.8} }
        ]},
        // 新增权重题2：测量对“行动”和“原则”的重视程度
        { text: "在团队合作中，你认为效率优先还是规则优先？", dim: "weight_mix2", opts: [
            {val:5, text:"效率优先，快速迭代", weightEffect: {action:1.3, principle:0.7} },
            {val:3, text:"平衡，按流程推进", weightEffect: {action:1.0, principle:1.0} },
            {val:1, text:"规则优先，按章办事", weightEffect: {action:0.7, principle:1.3} }
        ]}
    ];

    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);

    // DOM 元素
    const landing = document.getElementById('landingView');
    const quizView = document.getElementById('quizView');
    const loadingView = document.getElementById('loadingView');
    const resultView = document.getElementById('resultView');
    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const shareBtn = document.getElementById('shareBtn');
    const saveImgBtn = document.getElementById('saveImgBtn');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const qIndexDisplay = document.getElementById('qIndexDisplay');
    const qCountDisplay = document.getElementById('qCountDisplay');
    const progressFill = document.getElementById('progressFill');

    function renderQuestion() {
        const q = questions[currentIndex];
        questionText.innerText = q.text;
        optionsContainer.innerHTML = '';
        const selectedVal = userAnswers[currentIndex];
        q.opts.forEach((opt, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'quiz-option';
            if (selectedVal !== null && selectedVal === opt.val) optDiv.classList.add('selected');
            const prefix = String.fromCharCode(65+idx);
            optDiv.innerHTML = `<span style="font-weight:500;">${prefix}.</span> ${opt.text}`;
            optDiv.addEventListener('click', () => {
                userAnswers[currentIndex] = opt.val;
                renderQuestion();
                nextBtn.disabled = false;
                if (currentIndex === questions.length-1) nextBtn.innerText = '完成 ✓';
                else nextBtn.innerText = '下一题 →';
            });
            optionsContainer.appendChild(optDiv);
        });
        nextBtn.disabled = (userAnswers[currentIndex] === null);
        qIndexDisplay.innerText = `第${currentIndex+1}题`;
        qCountDisplay.innerText = `${currentIndex+1} / ${questions.length}`;
        progressFill.style.width = `${((currentIndex+1)/questions.length)*100}%`;
        prevBtn.disabled = (currentIndex === 0);
    }

    // 计算五维基础得分 (信念,行动,情感,原则,自信)
    function computeBaseScores() {
        let scores = { belief:0, action:0, empathy:0, principle:0, confidence:0 };
        for (let i=0; i<questions.length; i++) {
            const q = questions[i];
            const ans = userAnswers[i];
            if (ans === null) continue;
            if (q.dim === 'belief' || q.dim === 'action' || q.dim === 'empathy' || q.dim === 'principle' || q.dim === 'confidence') {
                scores[q.dim] += ans;
            }
            // 权重题不计入基础分
        }
        return scores;
    }

    // 根据权重题计算各维度的个性化权重系数 (信念,行动,情感,原则,自信)
    function computeDimensionWeights() {
        // 初始权重均为1
        let weights = { belief:1, action:1, empathy:1, principle:1, confidence:1 };
        // 处理权重题1 (影响信念和情感)
        const w1Ans = userAnswers[20]; // 第21题索引20
        if (w1Ans !== null) {
            const opt = questions[20].opts.find(o => o.val === w1Ans);
            if (opt && opt.weightEffect) {
                if (opt.weightEffect.belief) weights.belief *= opt.weightEffect.belief;
                if (opt.weightEffect.empathy) weights.empathy *= opt.weightEffect.empathy;
            }
        }
        // 处理权重题2 (影响行动和原则)
        const w2Ans = userAnswers[21]; // 第22题索引21
        if (w2Ans !== null) {
            const opt = questions[21].opts.find(o => o.val === w2Ans);
            if (opt && opt.weightEffect) {
                if (opt.weightEffect.action) weights.action *= opt.weightEffect.action;
                if (opt.weightEffect.principle) weights.principle *= opt.weightEffect.principle;
            }
        }
        // 归一化：使得五个权重之和为5
        let sum = weights.belief + weights.action + weights.empathy + weights.principle + weights.confidence;
        let factor = 5 / sum;
        weights.belief *= factor;
        weights.action *= factor;
        weights.empathy *= factor;
        weights.principle *= factor;
        weights.confidence *= factor;
        return weights;
    }

    // 曼哈顿距离 + 个性化权重
    function weightedManhattanDistance(userScores, charDims, weights) {
        return Math.abs(userScores.belief - charDims[0]) * weights.belief +
               Math.abs(userScores.action - charDims[1]) * weights.action +
               Math.abs(userScores.empathy - charDims[2]) * weights.empathy +
               Math.abs(userScores.principle - charDims[3]) * weights.principle +
               Math.abs(userScores.confidence - charDims[4]) * weights.confidence;
    }

    // 概率抽取 + 返回前三名
    function getProbabilisticTop3(userScores, weights) {
        let distances = [];
        for (let key of characterKeys) {
            const d = weightedManhattanDistance(userScores, CHARACTERS[key].dims, weights);
            distances.push({key, dist: d});
        }
        distances.sort((a,b) => a.dist - b.dist);
        const top3 = distances.slice(0,3);
        // 计算概率：距离越小概率越大，使用倒数
        let invSum = 0;
        let invs = top3.map(item => { let inv = 1/(item.dist + 0.1); invSum += inv; return inv; });
        let probs = invs.map(inv => inv / invSum);
        // 随机抽取
        let rand = Math.random();
        let accum = 0;
        let selectedIndex = 0;
        for (let i=0; i<probs.length; i++) {
            accum += probs[i];
            if (rand <= accum) { selectedIndex = i; break; }
        }
        const mainResult = top3[selectedIndex].key;
        const alternatives = top3.filter((_,idx) => idx !== selectedIndex).map(item => item.key);
        return { main: mainResult, alternatives: alternatives, allTop3: top3.map(t => t.key) };
    }

    // 雷达图绘制
    function renderRadarChart(canvas, scores) {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width = 400;
        const h = canvas.height = 400;
        const centerX = w/2, centerY = h/2;
        const radius = 140;
        const angles = [ -Math.PI/2, -Math.PI/2 + 2*Math.PI/5, -Math.PI/2 + 4*Math.PI/5, -Math.PI/2 + 6*Math.PI/5, -Math.PI/2 + 8*Math.PI/5 ];
        const labels = ["信念(理想)", "行动(主动)", "情感(热忱)", "原则(守序)", "自信(坚定)"];
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "#0a0c15";
        ctx.fillRect(0,0,w,h);
        ctx.strokeStyle = "#4b5563";
        ctx.fillStyle = "#e2e8f0";
        ctx.font = "12px 'Segoe UI'";
        for(let level=1; level<=4; level++) {
            ctx.beginPath();
            let r = radius * level / 4;
            for(let i=0;i<5;i++) {
                let x = centerX + r * Math.cos(angles[i]);
                let y = centerY + r * Math.sin(angles[i]);
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.strokeStyle = "#334155";
            ctx.stroke();
        }
        for(let i=0;i<5;i++) {
            let x = centerX + radius * Math.cos(angles[i]);
            let y = centerY + radius * Math.sin(angles[i]);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x,y);
            ctx.strokeStyle = "#475569";
            ctx.stroke();
            let labelX = centerX + (radius+15) * Math.cos(angles[i]);
            let labelY = centerY + (radius+15) * Math.sin(angles[i]);
            ctx.fillStyle = "#facc15";
            ctx.fillText(labels[i], labelX-15, labelY-5);
        }
        let points = [];
        for(let i=0;i<5;i++) {
            let value = Math.min(20, Math.max(0, scores[i])) / 20;
            let r = radius * value;
            let x = centerX + r * Math.cos(angles[i]);
            let y = centerY + r * Math.sin(angles[i]);
            points.push({x,y});
        }
        ctx.beginPath();
        for(let i=0;i<points.length;i++) {
            if(i===0) ctx.moveTo(points[i].x, points[i].y);
            else ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(245,158,11,0.3)";
        ctx.fill();
        ctx.strokeStyle = "#f59e0b";
        ctx.lineWidth = 2;
        ctx.stroke();
        for(let p of points) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = "#fbbf24";
            ctx.fill();
        }
    }

    function showResult() {
        const baseScores = computeBaseScores();
        const weights = computeDimensionWeights();
        const { main, alternatives, allTop3 } = getProbabilisticTop3(baseScores, weights);
        const char = CHARACTERS[main];
        const radarData = [baseScores.belief, baseScores.action, baseScores.empathy, baseScores.principle, baseScores.confidence];
        const traitsHtml = char.traits.map(t => `<span class="trait-badge">${t}</span>`).join('');
        const alternativesHtml = alternatives.length ? `<div class="similar-badges">✨ 你的灵魂中还回响着：${alternatives.map(a => CHARACTERS[a].title).join('、')} ✨</div>` : '';
        const resultHtml = `
            <div style="text-align:center;">
                <div style="font-size:3rem;">⚜️</div>
                <h2 class="serif-title gold-text" style="font-size:2rem;">${main}</h2>
                <p style="color:#fbbf24; letter-spacing:2px;">${char.title} · ${char.mbti}</p>
                <p style="background:rgba(0,0,0,0.4); border-radius:30px; padding:0.3rem 1rem; display:inline-block;">${char.faction}</p>
                <div style="margin:1rem 0;">${traitsHtml}</div>
                <div class="quote" style="padding:1rem;"><p>“${char.quote}”</p></div>
                <p style="text-align:left; line-height:1.5;">${char.desc}</p>
                <div class="radar-container" id="radarCanvasWrap">
                    <canvas id="radarCanvas" width="400" height="400" style="max-width:100%; height:auto; background:#0a0c15; border-radius:20px;"></canvas>
                </div>
                ${alternativesHtml}
                <p style="font-size:0.75rem; color:#aaa;">※ 维度分数: 信念/行动/情感/原则/自信 (0~20)</p>
            </div>
        `;
        document.getElementById('resultCardContainer').innerHTML = resultHtml;
        const canvas = document.getElementById('radarCanvas');
        if (canvas) renderRadarChart(canvas, radarData);
    }

    function resetTest() {
        currentIndex = 0;
        userAnswers = new Array(questions.length).fill(null);
        landing.classList.remove('hidden');
        quizView.classList.add('hidden');
        loadingView.classList.add('hidden');
        resultView.classList.add('hidden');
        nextBtn.disabled = true;
        nextBtn.innerText = '下一题 →';
    }

    function startQuizFlow() {
        landing.classList.add('hidden');
        quizView.classList.remove('hidden');
        currentIndex = 0;
        userAnswers = new Array(questions.length).fill(null);
        renderQuestion();
    }

    function nextQuestion() {
        if (userAnswers[currentIndex] === null) return;
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            renderQuestion();
        } else {
            quizView.classList.add('hidden');
            loadingView.classList.remove('hidden');
            setTimeout(() => {
                loadingView.classList.add('hidden');
                showResult();
                resultView.classList.remove('hidden');
            }, 1200);
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    function shareResult() {
        const baseScores = computeBaseScores();
        const weights = computeDimensionWeights();
        const { main } = getProbabilisticTop3(baseScores, weights);
        const char = CHARACTERS[main];
        const shareText = `【铃兰之剑·命运之轮】我的性格结果是：${main} · ${char.title} (${char.mbti})\n“${char.quote}”\n快来测测你是哪位英雄？`;
        if(navigator.clipboard) {
            navigator.clipboard.writeText(shareText).then(()=>alert("结果已复制，快去分享吧！"));
        } else alert(shareText);
    }

    // 克隆截图修复灰色
    async function saveAsImage() {
        const originalCard = document.getElementById('resultCardContainer');
        if (!originalCard) return;
        const cloneCard = originalCard.cloneNode(true);
        cloneCard.classList.add('clone-screenshot');
        cloneCard.style.position = 'fixed';
        cloneCard.style.top = '-9999px';
        cloneCard.style.left = '-9999px';
        cloneCard.style.width = originalCard.offsetWidth + 'px';
        cloneCard.style.background = '#121623';
        cloneCard.style.backdropFilter = 'none';
        document.body.appendChild(cloneCard);
        const cloneCanvas = cloneCard.querySelector('#radarCanvas');
        if (cloneCanvas) {
            const baseScores = computeBaseScores();
            const radarData = [baseScores.belief, baseScores.action, baseScores.empathy, baseScores.principle, baseScores.confidence];
            cloneCanvas.width = 400;
            cloneCanvas.height = 400;
            renderRadarChart(cloneCanvas, radarData);
        }
        try {
            const canvas = await html2canvas(cloneCard, { scale: 2.5, backgroundColor: '#121623', logging: false });
            const link = document.createElement('a');
            link.download = 'linglan_result.png';
            link.href = canvas.toDataURL();
            link.click();
        } catch(e) { alert("生成图片失败"); }
        finally { document.body.removeChild(cloneCard); }
    }

    startBtn.addEventListener('click', startQuizFlow);
    retryBtn.addEventListener('click', resetTest);
    nextBtn.addEventListener('click', nextQuestion);
    prevBtn.addEventListener('click', prevQuestion);
    shareBtn.addEventListener('click', shareResult);
    saveImgBtn.addEventListener('click', saveAsImage);

    function initParticles() {
        const container = document.getElementById('particlesContainer');
        for(let i=0;i<80;i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 4 + 1;
            p.style.width = size+'px';
            p.style.height = size+'px';
            p.style.left = Math.random()*100+'%';
            p.style.top = Math.random()*100+'%';
            p.style.animationDuration = Math.random()*8+4+'s';
            p.style.animationDelay = Math.random()*5+'s';
            container.appendChild(p);
        }
    }
    initParticles();
</script>
